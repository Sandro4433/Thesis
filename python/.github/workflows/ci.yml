name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, refactored-cleanup]

jobs:
  test:
    name: Test & Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      # Provide a dummy API key so Settings.__init__ doesn't raise at import time.
      # Tests that actually call the OpenAI API are integration tests and should
      # be skipped in CI unless a real secret is available.
      - name: Run tests
        env:
          OPENAI_API_KEY: sk-test-placeholder
        run: pytest --tb=short -q

      - name: Lint with ruff
        run: ruff check src/ tests/

  # Optional: only runs when OPENAI_API_KEY secret is configured in the repo
  integration:
    name: Integration tests (with real API key)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest -m integration --tb=short -q
